services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes-saas-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:5173
    networks:
      - notes-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notes-saas-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge
